name: cs4476_proj4
channels:
  - conda-forge  # Highest priority for consistency
  - pytorch      # For PyTorch and related packages
  - defaults     # Lower priority
  
dependencies:
  # --- Core ---
  - python
  - pip

  # --- PyTorch (CPU-only) ---
  - pytorch
  - torchvision
  - cpuonly

  # --- Data Science & ML ---
  - jupyter
  - matplotlib
  - numpy
  - pandas
  - scikit-learn
  - scipy
  
  # --- Image & Vision ---
  - pillow
  - opencv
  - imageio
  - pycm
  - colour-science
  
  # --- Utilities & Testing ---
  - pyyaml
  - pytest
  - mypy